version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tradeflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tradeflow.js
      POSTGRES_DB: o2c_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: .
    container_name: tradeflow-backend
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: o2c_db
      DB_USER: postgres
      DB_PASSWORD: tradeflow.js
      JWT_SECRET: tr4d3fl0w$3cr3tK3y!2026#xZ9
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build: ../tradeflow-ui
    container_name: tradeflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
